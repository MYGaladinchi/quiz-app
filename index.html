<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Night</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="board">

    <header class="board__header">
      <p class="eyebrow">Round 1 of 1</p>
      <h1 class="title">Quiz Night</h1>
    </header>

    <!-- Start screen -->
    <section id="start-screen" class="screen">
      <p class="lede">Ten general knowledge questions. No lifelines, no pressure.</p>
      <button id="start-btn" class="btn btn--primary">Chalk up and start</button>
    </section>

    <!-- Quiz screen -->
    <section id="quiz-screen" class="screen hidden">
      <div class="progress">
        <span id="question-count">Question 1 of 10</span>
        <span id="score-live">Score: 0</span>
      </div>

      <p id="question-text" class="question"></p>

      <div id="answers" class="answers"></div>

      <div class="feedback-row">
        <p id="feedback" class="feedback"></p>
        <button id="next-btn" class="btn btn--primary hidden">Next question</button>
      </div>
    </section>

    <!-- Results screen -->
    <section id="results-screen" class="screen hidden">
      <p class="eyebrow">Final tally</p>
      <p id="final-score" class="final-score"></p>
      <p id="final-message" class="lede"></p>
      <button id="restart-btn" class="btn btn--primary">Wipe the board &amp; retry</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
